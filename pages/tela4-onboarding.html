<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOVI Cam — Onboarding</title>
  <link rel="stylesheet" href="../src/css/onboarding.css">
</head>
<body>
  <a class="hub-link" href="../index.html">← Hub</a>
  <main class="screen">

    <!-- Status Bar -->
    <header class="status-bar">
      <span class="time">9:41</span>
      <div class="dynamic-island"></div>
      <div class="status-icons">
        <span>▲▲▲</span>
        <span>WiFi</span>
        <span>🔋</span>
      </div>
    </header>

    <!-- Camera Viewfinder (background) -->
    <section class="viewfinder">
      <div class="vf-noise"></div>
    </section>

    <!-- Onboarding Card -->
    <section class="card-overlay">
      <article class="card">

        <!-- Progress Indicators -->
        <div class="progress-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot dot--active"></div>
        </div>

        <!-- Icon -->
        <div class="icon-ring">
          <span class="icon-star">✦</span>
        </div>

        <!-- Text Content -->
        <h1 class="card-title">Navegue pelos modos</h1>
        <p class="card-desc">Arraste a barra de modos ou toque <br> diretamente para trocar. IA Auto é <br> sempre o ponto de partida.</p>

        <!-- Actions -->
        <a href="tela-ia.html" class="btn-proximo">Entendi</a>
        <a href="tela1-onboarding.html" class="btn-pular">Ver tutorial novamente</a>

      </article>
    </section>

  </main>
</body>
</html>
